global:
  scrape_interval: 120s
  evaluation_interval: 120s

  external_labels:
    monitor: "my-project"

rule_files:
  # - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "monitoring_node_exporter:9100"

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "monitoring_cadvisor:8080"
