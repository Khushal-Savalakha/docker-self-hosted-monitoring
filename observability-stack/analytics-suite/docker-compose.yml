services:
  mongo:
    image: mongo:5.0
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.10.2
    environment:
      - discovery.type=single-node
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  graylog:
    image: graylog/graylog:5.0
    environment:
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET}
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2}
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
    depends_on:
      - mongo
      - elasticsearch
    ports:
      - "9001:9000"
      - "12201:12201/udp"
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "9002:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-config/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./clickhouse-config/macros.xml:/etc/clickhouse-server/config.d/macros.xml
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  schema-migrator:
    image: signoz/signoz-schema-migrator:latest
    container_name: schema-migrator
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - sync
      - --dsn=tcp://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      - --replication=false
      - --dev
    restart: on-failure

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: always

  signoz-query-service:
    image: signoz/query-service:latest
    container_name: signoz-query-service
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - SIGNOZ_TELEMETRYSTORE_PROVIDER=${SIGNOZ_TELEMETRYSTORE_PROVIDER}
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
    volumes:
      - signoz_db:/var/lib/signoz
    ports:
      - "8082:8080"
    restart: always

  signoz-frontend:
    image: signoz/frontend:latest
    container_name: signoz-frontend
    depends_on:
      - signoz-query-service
    environment:
      - QUERY_SERVICE_URL=http://signoz-query-service:8080
      - SIGNOZ_ENABLE_AUTH=false
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3301:3301"
    restart: always

  # POSTHOG
  posthog-redis:
    image: redis:7
    container_name: posthog-redis
    restart: always

  posthog-zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: posthog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  posthog-kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    hostname: kafka
    depends_on:
      - posthog-zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: posthog-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:21.8
    container_name: posthog-clickhouse
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD}
    volumes:
      - posthog_clickhouse_data:/var/lib/clickhouse
      - ./posthog-clickhouse-config/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./posthog-clickhouse-config/macros.xml:/etc/clickhouse-server/config.d/macros.xml
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  posthog-web:
    image: posthog/posthog:release-1.43.1
    container_name: posthog
    depends_on:
      posthog-redis:
        condition: service_started
      posthog-clickhouse:
        condition: service_healthy
      posthog-kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTHOG_DB_USER}:${POSTHOG_DB_PASSWORD}@${POSTHOG_DB_HOST}:${POSTHOG_DB_PORT}/posthog
      REDIS_URL: redis://posthog-redis:6379/
      SITE_URL: "http://${SERVER_IP}:${POSTHOG_PORT}"
      JS_URL: "http://${SERVER_IP}:${POSTHOG_PORT}"
      DISABLE_SECURE_SSL_REDIRECT: "true"
      SECURE_COOKIES: "false"
      SECURE_SSL_REDIRECT: "false"
      IS_BEHIND_PROXY: "false"
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: "default"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_REPLICATION: "true"
      CLICKHOUSE_CLUSTER: "posthog"
      SKIP_ASYNC_MIGRATIONS_SETUP: "1"
      SKIP_SERVICE_VERSION_REQUIREMENTS: "1"
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
      KAFKA_HOSTS: kafka:9092
      DEBUG: "${POSTHOG_DEBUG:-0}"
      SELF_CAPTURE: "false"
      MULTI_TENANCY: "false"
      PRIMARY_DB: "clickhouse"
      POSTHOG_DB_NAME: "posthog"
    ports:
      - "${POSTHOG_PORT}:8000"
    restart: always

  posthog-plugin-server:
    image: posthog/posthog:release-1.43.1
    container_name: posthog-plugin-server
    command: /bin/sh -c "cd /code && node plugin-server/dist/index.js"
    depends_on:
      posthog-redis:
        condition: service_started
      posthog-clickhouse:
        condition: service_healthy
      posthog-kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTHOG_DB_USER}:${POSTHOG_DB_PASSWORD}@${POSTHOG_DB_HOST}:${POSTHOG_DB_PORT}/posthog
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: "default"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_REPLICATION: "true"
      CLICKHOUSE_CLUSTER: "posthog"
      KAFKA_HOSTS: kafka:9092
      SITE_URL: "http://${SERVER_IP}:${POSTHOG_PORT}"
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
      SKIP_SERVICE_VERSION_REQUIREMENTS: "1"
      DEBUG: "${POSTHOG_DEBUG:-0}"
    restart: always

volumes:
  es_data:
  clickhouse_data:
  signoz_db:
  posthog_db:
  posthog_clickhouse_data:
